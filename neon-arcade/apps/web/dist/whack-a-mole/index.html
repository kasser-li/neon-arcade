<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打地鼠游戏</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 {
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        .game-info {
            display: flex;
            gap: 30px;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.2);
            padding: 15px 30px;
            border-radius: 15px;
        }
        .info-item { text-align: center; color: #fff; }
        .info-item span { display: block; font-size: 2em; font-weight: bold; color: #ffd700; }
        .game-container {
            background: #8B4513;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }
        .hole {
            width: 120px;
            height: 120px;
            background: #5D3A1A;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            box-shadow: inset 0 10px 20px rgba(0,0,0,0.5);
        }
        .mole {
            position: absolute;
            bottom: -100%;
            left: 10%;
            width: 80%;
            height: 80%;
            background: linear-gradient(180deg, #8B7355 0%, #6B5344 100%);
            border-radius: 50% 50% 45% 45%;
            transition: bottom 0.1s;
            z-index: 2;
        }
        .mole.up { bottom: 10%; }
        .mole::before, .mole::after {
            content: '';
            position: absolute;
            width: 20%;
            height: 20%;
            background: #333;
            border-radius: 50%;
            top: 30%;
        }
        .mole::before { left: 20%; }
        .mole::after { right: 20%; }
        .mole .nose {
            position: absolute;
            width: 25%;
            height: 20%;
            background: #FF6B6B;
            border-radius: 50%;
            top: 50%;
            left: 37.5%;
        }
        .mole.hit { background: linear-gradient(180deg, #FF6B6B 0%, #CC5555 100%); transform: scale(0.9); }
        .mole.hit::before, .mole.hit::after { background: #fff; width: 25%; height: 10%; border-radius: 0; transform: rotate(45deg); top: 35%; }
        .mole.hit::after { transform: rotate(-45deg); }
        .mole.hit .nose { display: none; }
        .controls { margin-top: 20px; display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }
        .back-link {
            position: fixed;
            top: 20px; left: 20px;
            color: #fff;
            text-decoration: none;
            font-size: 1em;
            border: 1px solid #fff;
            padding: 8px 20px;
            border-radius: 20px;
            transition: all 0.3s;
            background: rgba(255,255,255,0.1);
        }
        .back-link:hover { background: #fff; color: #667eea; }
        button {
            padding: 15px 40px;
            font-size: 1.2em;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }
        .start-btn {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }
        .start-btn:hover { transform: translateY(-3px); }
        .start-btn:disabled { background: #666; cursor: not-allowed; transform: none; }
        .difficulty { display: flex; gap: 10px; margin-top: 15px; }
        .difficulty-btn {
            padding: 10px 25px;
            font-size: 1em;
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid rgba(255,255,255,0.3);
        }
        .difficulty-btn.active { background: #ffd700; color: #333; border-color: #ffd700; }
        .game-over {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .game-over.show { opacity: 1; pointer-events: all; }
        .game-over h2 { color: #fff; font-size: 3em; margin-bottom: 20px; }
        .game-over .final-score { color: #ffd700; font-size: 4em; margin-bottom: 30px; }
        @media (max-width: 500px) {
            .hole { width: 90px; height: 90px; }
            h1 { font-size: 1.8em; }
        }
    </style>
</head>
<body>
    <h1>打地鼠</h1>
    <div class="game-info">
        <div class="info-item"><span id="score">0</span><label>得分</label></div>
        <div class="info-item"><span id="time">30</span><label>时间</label></div>
        <div class="info-item"><span id="combo">0</span><label>连击</label></div>
    </div>
    <div class="game-container">
        <div class="grid" id="grid">
            <div class="hole" data-index="0"><div class="mole"><div class="nose"></div></div></div>
            <div class="hole" data-index="1"><div class="mole"><div class="nose"></div></div></div>
            <div class="hole" data-index="2"><div class="mole"><div class="nose"></div></div></div>
            <div class="hole" data-index="3"><div class="mole"><div class="nose"></div></div></div>
            <div class="hole" data-index="4"><div class="mole"><div class="nose"></div></div></div>
            <div class="hole" data-index="5"><div class="mole"><div class="nose"></div></div></div>
            <div class="hole" data-index="6"><div class="mole"><div class="nose"></div></div></div>
            <div class="hole" data-index="7"><div class="mole"><div class="nose"></div></div></div>
            <div class="hole" data-index="8"><div class="mole"><div class="nose"></div></div></div>
        </div>
    </div>
    <div class="controls">
        <button class="start-btn" id="startBtn">开始游戏</button>
        <div class="difficulty">
            <button class="difficulty-btn active" data-level="easy">简单</button>
            <button class="difficulty-btn" data-level="normal">普通</button>
            <button class="difficulty-btn" data-level="hard">困难</button>
        </div>
    </div>
    <div class="game-over" id="gameOver">
        <h2>游戏结束!</h2>
        <div class="final-score" id="finalScore">0</div>
        <button class="start-btn" id="restartBtn">再来一局</button>
    </div>
    <script>
        const holes = document.querySelectorAll('.hole');
        const scoreEl = document.getElementById('score');
        const timeEl = document.getElementById('time');
        const comboEl = document.getElementById('combo');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const gameOverEl = document.getElementById('gameOver');
        const finalScoreEl = document.getElementById('finalScore');
        const difficultyBtns = document.querySelectorAll('.difficulty-btn');

        let score = 0, time = 30, combo = 0, gameActive = false;
        let lastHole, timer, moleTimer;
        let difficulty = { easy: 1000, normal: 700, hard: 500 };
        let currentLevel = 'easy';

        function randomTime(min, max) { return Math.round(Math.random() * (max - min) + min); }
        function randomHole() {
            const idx = Math.floor(Math.random() * holes.length);
            const hole = holes[idx];
            if (hole === lastHole) return randomHole();
            lastHole = hole;
            return hole;
        }
        function peep() {
            const time = randomTime(difficulty[currentLevel], difficulty[currentLevel] + 400);
            const hole = randomHole();
            const mole = hole.querySelector('.mole');
            mole.classList.add('up');
            mole.classList.remove('hit');
            moleTimer = setTimeout(() => {
                mole.classList.remove('up');
                if (gameActive) peep();
            }, time);
        }
        function startGame() {
            score = 0; time = 30; combo = 0;
            scoreEl.textContent = score;
            timeEl.textContent = time;
            comboEl.textContent = combo;
            gameActive = true;
            startBtn.disabled = true;
            gameOverEl.classList.remove('show');
            peep();
            timer = setInterval(() => {
                time--;
                timeEl.textContent = time;
                if (time <= 0) endGame();
            }, 1000);
        }
        function endGame() {
            gameActive = false;
            clearInterval(timer);
            clearTimeout(moleTimer);
            startBtn.disabled = false;
            finalScoreEl.textContent = score;
            gameOverEl.classList.add('show');
            holes.forEach(h => h.querySelector('.mole').classList.remove('up'));
        }
        function bonk(e) {
            if (!e.isTrusted) return;
            const mole = this.querySelector('.mole');
            if (!mole.classList.contains('up') || mole.classList.contains('hit')) return;
            mole.classList.add('hit');
            mole.classList.remove('up');
            combo++;
            score += 10 + combo * 2;
            scoreEl.textContent = score;
            comboEl.textContent = combo;
        }
        holes.forEach(hole => hole.addEventListener('click', bonk));
        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);
        difficultyBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                difficultyBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentLevel = btn.dataset.level;
            });
        });
    </script>
</body>
</html>
