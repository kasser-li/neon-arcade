<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>霓虹飞机大战</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            touch-action: none;
        }
        h1 {
            color: #00ff88;
            text-shadow: 0 0 20px #00ff88, 0 0 40px #00ff88;
            font-size: 2em;
            margin-bottom: 10px;
            letter-spacing: 5px;
        }
        .game-info {
            display: flex;
            gap: 30px;
            margin-bottom: 10px;
            color: #fff;
            font-size: 1em;
        }
        .info-item {
            text-align: center;
            padding: 8px 20px;
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid #00ff88;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.3);
        }
        .info-item span {
            display: block;
            font-size: 1.5em;
            font-weight: bold;
            color: #00ff88;
        }
        .game-container {
            position: relative;
            padding: 3px;
            background: linear-gradient(45deg, #00ff88, #00f5ff, #00ff88);
            border-radius: 15px;
            animation: glow 3s linear infinite;
        }
        @keyframes glow {
            0%, 100% { filter: hue-rotate(0deg); }
            50% { filter: hue-rotate(180deg); }
        }
        canvas {
            display: block;
            background: #0a0a0a;
            border-radius: 12px;
        }
        button {
            padding: 12px 30px;
            font-size: 1em;
            border: 2px solid #00ff88;
            background: transparent;
            color: #00ff88;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 10px;
        }
        button:hover {
            background: #00ff88;
            color: #0a0a0a;
            box-shadow: 0 0 30px #00ff88;
        }
        .game-over {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #fff;
            display: none;
            background: rgba(0,0,0,0.95);
            padding: 40px;
            border-radius: 15px;
            border: 2px solid #ff0066;
            box-shadow: 0 0 30px #ff0066;
        }
        .game-over.show { display: block; }
        .game-over h2 { font-size: 2em; color: #ff0066; text-shadow: 0 0 20px #ff0066; margin-bottom: 20px; }
        .instructions {
            margin-top: 10px;
            color: #888;
            font-size: 0.8em;
            text-align: center;
            padding: 0 20px;
        }
        .touch-controls {
            display: none;
            margin-top: 15px;
            gap: 10px;
        }
        .touch-btn {
            width: 60px;
            height: 60px;
            border: 2px solid #00ff88;
            background: rgba(0, 255, 136, 0.1);
            color: #00ff88;
            border-radius: 50%;
            font-size: 1.5em;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
        }
        .touch-btn:active { background: #00ff88; color: #0a0a0a; }
        .touch-row { display: flex; gap: 10px; justify-content: center; }
        @media (max-width: 500px) {
            h1 { font-size: 1.5em; }
            canvas { width: 320px; height: 480px; }
            .game-info { gap: 20px; font-size: 0.9em; }
            .touch-controls { display: flex; flex-direction: column; }
        }
        .back-link {
            position: fixed;
            top: 20px; left: 20px;
            color: #00ff88;
            text-decoration: none;
            font-size: 0.9em;
            border: 1px solid #00ff88;
            padding: 8px 20px;
            border-radius: 20px;
            transition: all 0.3s;
        }
        .back-link:hover { background: #00ff88; color: #0a0a0a; }
    </style>
</head>
<body>
    <h1>NEON AIR BATTLE</h1>
    <div class="game-info">
        <div class="info-item"><span id="score">0</span>得分</div>
        <div class="info-item"><span id="lives">3</span>生命</div>
    </div>
    <div class="game-container">
        <canvas id="game" width="360" height="540"></canvas>
        <div class="game-over" id="gameOver">
            <h2>GAME OVER</h2>
            <p>最终得分: <span id="finalScore">0</span></p>
            <button onclick="startGame()">重新开始</button>
        </div>
    </div>
    <button onclick="startGame()">开始游戏</button>
    <div class="instructions">
        💻 电脑：方向键 ← → 移动（自动开火）<br>
        📱 手机：触摸屏幕移动（自动开火）
    </div>
    <div class="touch-controls">
        <div class="touch-row">
            <div class="touch-btn" data-dir="left">←</div>
            <div class="touch-btn" data-dir="right">→</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        let player, bullets, enemies, particles, score, lives, gameRunning;
        let keys = {}, touchX = null;

        function init() {
            player = { x: canvas.width/2 - 20, y: canvas.height - 70, width: 40, height: 50, speed: 5 };
            bullets = []; enemies = []; particles = [];
            score = 0; lives = 3;
            document.getElementById('score').textContent = score;
            document.getElementById('lives').textContent = lives;
        }

        function drawPlayer() {
            ctx.fillStyle = '#00ff88';
            ctx.shadowBlur = 20; ctx.shadowColor = '#00ff88';
            ctx.beginPath();
            ctx.moveTo(player.x + player.width/2, player.y);
            ctx.lineTo(player.x + player.width, player.y + player.height);
            ctx.lineTo(player.x + player.width/2, player.y + player.height - 10);
            ctx.lineTo(player.x, player.y + player.height);
            ctx.closePath(); ctx.fill();
            ctx.shadowBlur = 0;
        }

        function drawBullet(b) {
            ctx.fillStyle = '#00f5ff';
            ctx.shadowBlur = 10; ctx.shadowColor = '#00f5ff';
            ctx.fillRect(b.x - 2, b.y, 4, 15);
            ctx.shadowBlur = 0;
        }

        function drawEnemy(e) {
            ctx.fillStyle = e.color;
            ctx.shadowBlur = 15; ctx.shadowColor = e.color;
            ctx.beginPath();
            ctx.moveTo(e.x + e.width/2, e.y + e.height);
            ctx.lineTo(e.x + e.width, e.y);
            ctx.lineTo(e.x, e.y);
            ctx.closePath(); ctx.fill();
            ctx.shadowBlur = 0;
        }

        function drawParticle(p) {
            ctx.fillStyle = p.color;
            ctx.globalAlpha = p.life;
            ctx.fillRect(p.x, p.y, p.size, p.size);
            ctx.globalAlpha = 1;
        }

        function createExplosion(x, y, color) {
            for (let i = 0; i < 10; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    size: Math.random() * 4 + 2,
                    color: color, life: 1
                });
            }
        }

        function spawnEnemy() {
            const types = [
                { width: 30, height: 30, speed: 2, color: '#ff0066', points: 10 },
                { width: 40, height: 40, speed: 1.5, color: '#ff6600', points: 20 },
                { width: 25, height: 25, speed: 3, color: '#ff00ff', points: 30 }
            ];
            const type = types[Math.floor(Math.random() * types.length)];
            enemies.push({
                x: Math.random() * (canvas.width - type.width),
                y: -type.height,
                ...type
            });
        }

        function update() {
            if (!gameRunning) return;

            // 玩家移动
            if (keys['ArrowLeft'] || keys['a']) player.x -= player.speed;
            if (keys['ArrowRight'] || keys['d']) player.x += player.speed;
            if (touchX !== null) {
                const dx = touchX - (player.x + player.width/2);
                if (Math.abs(dx) > 5) player.x += dx > 0 ? player.speed : -player.speed;
            }
            player.x = Math.max(0, Math.min(canvas.width - player.width, player.x));

            // 自动开火（每10帧发射一次）
            if (Math.random() < 0.15) {
                bullets.push({ x: player.x + player.width/2, y: player.y, speed: 8 });
            }

            // 更新子弹
            bullets = bullets.filter(b => {
                b.y -= b.speed;
                return b.y > -10;
            });

            // 生成敌人
            if (Math.random() < 0.02 + score/5000) spawnEnemy();

            // 更新敌人
            enemies = enemies.filter(e => {
                e.y += e.speed;
                if (e.y > canvas.height) {
                    lives--;
                    document.getElementById('lives').textContent = lives;
                    if (lives <= 0) gameOver();
                    return false;
                }

                // 碰撞检测 - 子弹打敌人
                for (let i = bullets.length - 1; i >= 0; i--) {
                    const b = bullets[i];
                    if (b.x > e.x && b.x < e.x + e.width && b.y > e.y && b.y < e.y + e.height) {
                        createExplosion(e.x + e.width/2, e.y + e.height/2, e.color);
                        score += e.points;
                        document.getElementById('score').textContent = score;
                        bullets.splice(i, 1);
                        return false;
                    }
                }

                // 碰撞检测 - 敌人撞玩家
                if (player.x < e.x + e.width && player.x + player.width > e.x &&
                    player.y < e.y + e.height && player.y + player.height > e.y) {
                    createExplosion(player.x + player.width/2, player.y + player.height/2, '#00ff88');
                    lives--;
                    document.getElementById('lives').textContent = lives;
                    if (lives <= 0) gameOver();
                    return false;
                }

                return true;
            });

            // 更新粒子
            particles = particles.filter(p => {
                p.x += p.vx; p.y += p.vy;
                p.life -= 0.05;
                return p.life > 0;
            });
        }

        function draw() {
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawPlayer();
            bullets.forEach(drawBullet);
            enemies.forEach(drawEnemy);
            particles.forEach(drawParticle);
        }

        function gameLoop() {
            update();
            draw();
            if (gameRunning) requestAnimationFrame(gameLoop);
        }

        function gameOver() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').classList.add('show');
        }

        function startGame() {
            init();
            gameRunning = true;
            document.getElementById('gameOver').classList.remove('show');
            gameLoop();
        }

        // 自动开始游戏
        window.onload = function() {
            startGame();
        };

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (e.key === ' ') e.preventDefault();
        });
        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
            if (e.key === ' ') keys['spacePressed'] = false;
        });

        // 触摸控制
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            touchX = e.touches[0].clientX - canvas.getBoundingClientRect().left;
        }, {passive: false});

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            touchX = e.touches[0].clientX - canvas.getBoundingClientRect().left;
        }, {passive: false});

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            touchX = null;
        }, {passive: false});

        // 触摸按钮控制
        document.querySelectorAll('.touch-btn').forEach(btn => {
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const dir = btn.dataset.dir;
                keys[dir === 'left' ? 'ArrowLeft' : 'ArrowRight'] = true;
            }, {passive: false});
            btn.addEventListener('touchend', (e) => {
                e.preventDefault();
                const dir = btn.dataset.dir;
                keys[dir === 'left' ? 'ArrowLeft' : 'ArrowRight'] = false;
            }, {passive: false});
        });

        draw();
    </script>
</body>
</html>
