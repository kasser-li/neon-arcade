<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>霓虹2048</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            touch-action: none;
        }
        h1 {
            color: #ffcc00;
            text-shadow: 0 0 20px #ffcc00, 0 0 40px #ffcc00;
            font-size: 2.5em;
            margin-bottom: 10px;
            letter-spacing: 10px;
        }
        .subtitle { color: #888; margin-bottom: 15px; font-size: 0.9em; }
        .game-info {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }
        .info-box {
            background: rgba(255, 204, 0, 0.1);
            border: 1px solid #ffcc00;
            border-radius: 10px;
            padding: 10px 25px;
            text-align: center;
            color: #fff;
        }
        .info-box span {
            display: block;
            font-size: 1.5em;
            font-weight: bold;
            color: #ffcc00;
        }
        .game-container {
            position: relative;
            padding: 3px;
            background: linear-gradient(45deg, #ffcc00, #ff6600, #ffcc00);
            border-radius: 15px;
            animation: glow 3s linear infinite;
        }
        @keyframes glow {
            0%, 100% { filter: hue-rotate(0deg); }
            50% { filter: hue-rotate(180deg); }
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 80px);
            grid-template-rows: repeat(4, 80px);
            gap: 10px;
            padding: 15px;
            background: #1a1a1a;
            border-radius: 12px;
        }
        .cell {
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8em;
            font-weight: bold;
            color: #fff;
            transition: all 0.15s ease;
        }
        .cell[data-value="2"] { background: #eee4da; color: #776e65; }
        .cell[data-value="4"] { background: #ede0c8; color: #776e65; }
        .cell[data-value="8"] { background: #f2b179; color: #f9f6f2; }
        .cell[data-value="16"] { background: #f59563; color: #f9f6f2; }
        .cell[data-value="32"] { background: #f67c5f; color: #f9f6f2; }
        .cell[data-value="64"] { background: #f65e3b; color: #f9f6f2; }
        .cell[data-value="128"] { background: #edcf72; color: #f9f6f2; box-shadow: 0 0 10px #edcf72; }
        .cell[data-value="256"] { background: #edcc61; color: #f9f6f2; box-shadow: 0 0 15px #edcc61; }
        .cell[data-value="512"] { background: #edc850; color: #f9f6f2; box-shadow: 0 0 20px #edc850; }
        .cell[data-value="1024"] { background: #edc53f; color: #f9f6f2; box-shadow: 0 0 25px #edc53f; }
        .cell[data-value="2048"] { background: #edc22e; color: #f9f6f2; box-shadow: 0 0 30px #edc22e; }
        button {
            padding: 12px 30px;
            font-size: 1em;
            border: 2px solid #ffcc00;
            background: transparent;
            color: #ffcc00;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 15px;
        }
        button:hover {
            background: #ffcc00;
            color: #0a0a0a;
            box-shadow: 0 0 30px #ffcc00;
        }
        .game-over {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #fff;
            display: none;
            background: rgba(0,0,0,0.95);
            padding: 40px;
            border-radius: 15px;
            border: 2px solid #ff0066;
            box-shadow: 0 0 30px #ff0066;
        }
        .game-over.show { display: block; }
        .game-over h2 { font-size: 2em; color: #ff0066; text-shadow: 0 0 20px #ff0066; margin-bottom: 20px; }
        .instructions {
            margin-top: 15px;
            color: #888;
            font-size: 0.85em;
            text-align: center;
            padding: 0 20px;
        }
        .back-link {
            position: fixed;
            top: 20px; left: 20px;
            color: #ffcc00;
            text-decoration: none;
            font-size: 1em;
            border: 1px solid #ffcc00;
            padding: 8px 20px;
            border-radius: 20px;
            transition: all 0.3s;
        }
        .back-link:hover { background: #ffcc00; color: #0a0a0a; }
        @media (max-width: 500px) {
            h1 { font-size: 2em; letter-spacing: 5px; }
            .grid-container { grid-template-columns: repeat(4, 65px); grid-template-rows: repeat(4, 65px); gap: 8px; padding: 12px; }
            .cell { font-size: 1.3em; }
            .game-info { gap: 15px; }
            .info-box { padding: 8px 18px; }
        }
    </style>
</head>
<body>
    <h1>2048</h1>
    <div class="subtitle">合并数字，达到2048！</div>
    <div class="game-info">
        <div class="info-box">得分<span id="score">0</span></div>
        <div class="info-box">最高分<span id="best">0</span></div>
    </div>
    <div class="game-container">
        <div class="grid-container" id="grid"></div>
        <div class="game-over" id="gameOver">
            <h2 id="gameOverText">GAME OVER</h2>
            <button onclick="startGame()">再玩一次</button>
        </div>
    </div>
    <button onclick="startGame()">新游戏</button>
    <div class="instructions">
        💻 电脑：方向键 ↑↓←→ 或 WASD 控制<br>
        📱 手机：滑动屏幕控制方向
    </div>

    <script>
        const gridSize = 4;
        let board = [], score = 0, bestScore = localStorage.getItem('2048best') || 0;
        document.getElementById('best').textContent = bestScore;

        function initGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            for (let i = 0; i < gridSize * gridSize; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                grid.appendChild(cell);
            }
        }

        function updateDisplay() {
            const cells = document.querySelectorAll('.cell');
            for (let i = 0; i < gridSize; i++) {
                for (let j = 0; j < gridSize; j++) {
                    const value = board[i][j];
                    const cell = cells[i * gridSize + j];
                    cell.textContent = value || '';
                    cell.setAttribute('data-value', value);
                }
            }
            document.getElementById('score').textContent = score;
        }

        function addRandomTile() {
            const empty = [];
            for (let i = 0; i < gridSize; i++) {
                for (let j = 0; j < gridSize; j++) {
                    if (!board[i][j]) empty.push({i, j});
                }
            }
            if (empty.length) {
                const {i, j} = empty[Math.floor(Math.random() * empty.length)];
                board[i][j] = Math.random() < 0.9 ? 2 : 4;
            }
        }

        function slideRow(row) {
            let arr = row.filter(val => val);
            for (let i = 0; i < arr.length - 1; i++) {
                if (arr[i] === arr[i + 1]) {
                    arr[i] *= 2;
                    score += arr[i];
                    arr.splice(i + 1, 1);
                }
            }
            while (arr.length < gridSize) arr.push(0);
            return arr;
        }

        function moveLeft() {
            let moved = false;
            for (let i = 0; i < gridSize; i++) {
                const oldRow = [...board[i]];
                board[i] = slideRow(board[i]);
                if (oldRow.toString() !== board[i].toString()) moved = true;
            }
            return moved;
        }

        function moveRight() {
            let moved = false;
            for (let i = 0; i < gridSize; i++) {
                const oldRow = [...board[i]];
                board[i] = slideRow(board[i].reverse()).reverse();
                if (oldRow.toString() !== board[i].toString()) moved = true;
            }
            return moved;
        }

        function moveUp() {
            let moved = false;
            for (let j = 0; j < gridSize; j++) {
                let col = [];
                for (let i = 0; i < gridSize; i++) col.push(board[i][j]);
                const oldCol = [...col];
                col = slideRow(col);
                for (let i = 0; i < gridSize; i++) board[i][j] = col[i];
                if (oldCol.toString() !== col.toString()) moved = true;
            }
            return moved;
        }

        function moveDown() {
            let moved = false;
            for (let j = 0; j < gridSize; j++) {
                let col = [];
                for (let i = 0; i < gridSize; i++) col.push(board[i][j]);
                const oldCol = [...col];
                col = slideRow(col.reverse()).reverse();
                for (let i = 0; i < gridSize; i++) board[i][j] = col[i];
                if (oldCol.toString() !== col.toString()) moved = true;
            }
            return moved;
        }

        function canMove() {
            for (let i = 0; i < gridSize; i++) {
                for (let j = 0; j < gridSize; j++) {
                    if (!board[i][j]) return true;
                    if (j < gridSize - 1 && board[i][j] === board[i][j + 1]) return true;
                    if (i < gridSize - 1 && board[i][j] === board[i + 1][j]) return true;
                }
            }
            return false;
        }

        function checkWin() {
            for (let i = 0; i < gridSize; i++) {
                for (let j = 0; j < gridSize; j++) {
                    if (board[i][j] === 2048) return true;
                }
            }
            return false;
        }

        function gameOver(won) {
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('2048best', bestScore);
                document.getElementById('best').textContent = bestScore;
            }
            document.getElementById('gameOverText').textContent = won ? 'YOU WIN!' : 'GAME OVER';
            document.getElementById('gameOver').classList.add('show');
        }

        function makeMove(direction) {
            let moved = false;
            switch(direction) {
                case 'left': moved = moveLeft(); break;
                case 'right': moved = moveRight(); break;
                case 'up': moved = moveUp(); break;
                case 'down': moved = moveDown(); break;
            }
            if (moved) {
                addRandomTile();
                updateDisplay();
                if (checkWin()) {
                    setTimeout(() => gameOver(true), 300);
                } else if (!canMove()) {
                    setTimeout(() => gameOver(false), 300);
                }
            }
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (document.getElementById('gameOver').classList.contains('show')) return;
            switch(e.key) {
                case 'ArrowLeft': case 'a': case 'A': e.preventDefault(); makeMove('left'); break;
                case 'ArrowRight': case 'd': case 'D': e.preventDefault(); makeMove('right'); break;
                case 'ArrowUp': case 'w': case 'W': e.preventDefault(); makeMove('up'); break;
                case 'ArrowDown': case 's': case 'S': e.preventDefault(); makeMove('down'); break;
            }
        });

        // 触摸控制
        let touchStartX = 0, touchStartY = 0;
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, {passive: true});

        document.addEventListener('touchend', (e) => {
            if (document.getElementById('gameOver').classList.contains('show')) return;
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;
            const minSwipe = 50;

            if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > minSwipe) {
                makeMove(dx > 0 ? 'right' : 'left');
            } else if (Math.abs(dy) > minSwipe) {
                makeMove(dy > 0 ? 'down' : 'up');
            }
        }, {passive: true});

        function startGame() {
            board = Array(gridSize).fill().map(() => Array(gridSize).fill(0));
            score = 0;
            document.getElementById('score').textContent = score;
            document.getElementById('gameOver').classList.remove('show');
            addRandomTile();
            addRandomTile();
            updateDisplay();
        }

        initGrid();
        
        // 页面加载后自动开始
        window.onload = function() {
            startGame();
        };
    </script>
</body>
</html>
