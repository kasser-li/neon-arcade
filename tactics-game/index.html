<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 战棋 - 极简版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: #1a1a2e;
            color: #fff;
            overflow: hidden;
        }
        #game-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(0,0,0,0.7);
            padding: 15px 20px;
            border-radius: 10px;
            border: 1px solid #444;
        }
        #ui h2 { margin-bottom: 10px; font-size: 1.2em; }
        #ui p { color: #888; font-size: 0.9em; margin: 5px 0; }
        #turn-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
            padding: 15px 30px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1.2em;
        }
        .player-turn {
            background: linear-gradient(45deg, #0066ff, #00ccff);
        }
        .enemy-turn {
            background: linear-gradient(45deg, #ff0066, #ff6600);
        }
        #message {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            padding: 15px 40px;
            background: rgba(0,0,0,0.8);
            border-radius: 10px;
            font-size: 1.1em;
            opacity: 0;
            transition: opacity 0.3s;
        }
        #message.show { opacity: 1; }
        #restart-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 200;
            padding: 20px 50px;
            background: linear-gradient(45deg, #ff0066, #ff00ff);
            border: none;
            color: #fff;
            border-radius: 30px;
            font-size: 1.3em;
            cursor: pointer;
            display: none;
        }
        #restart-btn:hover {
            transform: translate(-50%, -50%) scale(1.05);
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="ui">
            <h2>🎮 3D 战棋</h2>
            <p>🟦 蓝色 = 你的角色</p>
            <p>🟥 红色 = 敌人</p>
            <p>🟩 绿色 = 可移动</p>
            <p>点击绿色格子移动</p>
            <p>靠近敌人自动攻击</p>
        </div>
        <div id="turn-indicator" class="player-turn">你的回合</div>
        <div id="message"></div>
        <button id="restart-btn" onclick="restartGame()">再来一局</button>
    </div>

    <script type="module">
        import * as THREE from 'https://esm.sh/three@0.160.0';

        // 游戏状态
        const state = {
            isPlayerTurn: true,
            gameOver: false,
            gridSize: 5,
            cellSize: 2,
            player: { x: 1, y: 1, hp: 100 },
            enemy: { x: 3, y: 3, hp: 100 },
            moveRange: 2
        };

        // Three.js 场景
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 12, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.getElementById('game-container').appendChild(renderer.domElement);

        // 灯光
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // 网格组
        const gridGroup = new THREE.Group();
        scene.add(gridGroup);

        const cells = [];
        const cellMeshes = [];

        // 创建网格
        function createGrid() {
            const offset = (state.gridSize - 1) * state.cellSize / 2;

            for (let x = 0; x < state.gridSize; x++) {
                cells[x] = [];
                for (let y = 0; y < state.gridSize; y++) {
                    // 地板
                    const geometry = new THREE.BoxGeometry(state.cellSize * 0.95, 0.2, state.cellSize * 0.95);
                    const material = new THREE.MeshStandardMaterial({ 
                        color: 0x333333,
                        roughness: 0.8
                    });
                    const cell = new THREE.Mesh(geometry, material);
                    cell.position.set(
                        x * state.cellSize - offset,
                        -0.1,
                        y * state.cellSize - offset
                    );
                    cell.userData = { x, y, type: 'cell' };
                    cell.receiveShadow = true;
                    gridGroup.add(cell);
                    cells[x][y] = cell;
                    cellMeshes.push(cell);
                }
            }
        }

        // 创建角色模型
        function createCharacter(color, isPlayer) {
            const group = new THREE.Group();

            // 身体
            const bodyGeo = new THREE.CylinderGeometry(0.4, 0.5, 1.2, 8);
            const bodyMat = new THREE.MeshStandardMaterial({ color: color });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 0.6;
            body.castShadow = true;
            group.add(body);

            // 头
            const headGeo = new THREE.SphereGeometry(0.35, 16, 16);
            const headMat = new THREE.MeshStandardMaterial({ color: 0xffccaa });
            const head = new THREE.Mesh(headGeo, headMat);
            head.position.y = 1.4;
            head.castShadow = true;
            group.add(head);

            // 武器
            const weaponGeo = new THREE.BoxGeometry(0.1, 1.5, 0.1);
            const weaponMat = new THREE.MeshStandardMaterial({ 
                color: isPlayer ? 0x00ffff : 0xff6600,
                emissive: isPlayer ? 0x0044aa : 0xaa4400,
                emissiveIntensity: 0.3
            });
            const weapon = new THREE.Mesh(weaponGeo, weaponMat);
            weapon.position.set(isPlayer ? 0.5 : -0.5, 1, 0.3);
            weapon.rotation.z = isPlayer ? -0.3 : 0.3;
            weapon.castShadow = true;
            group.add(weapon);

            // 血条背景
            const hpBgGeo = new THREE.PlaneGeometry(1, 0.15);
            const hpBgMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
            const hpBg = new THREE.Mesh(hpBgGeo, hpBgMat);
            hpBg.position.y = 2;
            hpBg.rotation.x = -Math.PI / 6;
            group.add(hpBg);

            // 血条
            const hpGeo = new THREE.PlaneGeometry(0.9, 0.1);
            const hpMat = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
            const hpBar = new THREE.Mesh(hpGeo, hpMat);
            hpBar.position.set(-0.45 + 0.45, 2, 0.01);
            hpBar.rotation.x = -Math.PI / 6;
            hpBar.userData = { isHpBar: true };
            group.add(hpBar);

            return group;
        }

        // 玩家和敌人
        let playerMesh, enemyMesh;

        function createCharacters() {
            // 玩家
            playerMesh = createCharacter(0x0066ff, true);
            updateCharacterPosition(playerMesh, state.player.x, state.player.y);
            scene.add(playerMesh);

            // 敌人
            enemyMesh = createCharacter(0xff3333, false);
            updateCharacterPosition(enemyMesh, state.enemy.x, state.enemy.y);
            scene.add(enemyMesh);
        }

        function updateCharacterPosition(mesh, x, y) {
            const offset = (state.gridSize - 1) * state.cellSize / 2;
            mesh.position.set(
                x * state.cellSize - offset,
                0,
                y * state.cellSize - offset
            );
        }

        function updateHpBar(mesh, hp) {
            const hpBar = mesh.children.find(c => c.userData.isHpBar);
            if (hpBar) {
                hpBar.scale.x = hp / 100;
                hpBar.material.color.setHex(hp > 50 ? 0x00ff00 : hp > 25 ? 0xffff00 : 0xff0000);
            }
        }

        // 显示可移动范围
        let moveIndicators = [];

        function showMoveRange() {
            clearMoveRange();
            if (!state.isPlayerTurn || state.gameOver) return;

            const px = state.player.x;
            const py = state.player.y;

            for (let x = 0; x < state.gridSize; x++) {
                for (let y = 0; y < state.gridSize; y++) {
                    const dist = Math.abs(x - px) + Math.abs(y - py);
                    if (dist > 0 && dist <= state.moveRange) {
                        // 创建移动指示器
                        const geo = new THREE.RingGeometry(0.3, 0.5, 16);
                        const mat = new THREE.MeshBasicMaterial({ 
                            color: 0x00ff00,
                            transparent: true,
                            opacity: 0.6,
                            side: THREE.DoubleSide
                        });
                        const indicator = new THREE.Mesh(geo, mat);
                        const offset = (state.gridSize - 1) * state.cellSize / 2;
                        indicator.position.set(
                            x * state.cellSize - offset,
                            0.05,
                            y * state.cellSize - offset
                        );
                        indicator.rotation.x = -Math.PI / 2;
                        indicator.userData = { x, y, type: 'move' };
                        scene.add(indicator);
                        moveIndicators.push(indicator);

                        // 高亮地板
                        cells[x][y].material.color.setHex(0x225522);
                    }
                }
            }
        }

        function clearMoveRange() {
            moveIndicators.forEach(m => scene.remove(m));
            moveIndicators = [];
            for (let x = 0; x < state.gridSize; x++) {
                for (let y = 0; y < state.gridSize; y++) {
                    cells[x][y].material.color.setHex(0x333333);
                }
            }
        }

        // 攻击特效
        function createAttackEffect(fromX, fromY, toX, toY, isPlayer) {
            const offset = (state.gridSize - 1) * state.cellSize / 2;
            const fx = fromX * state.cellSize - offset;
            const fz = fromY * state.cellSize - offset;
            const tx = toX * state.cellSize - offset;
            const tz = toY * state.cellSize - offset;

            // 剑光
            const geo = new THREE.BoxGeometry(0.1, 0.1, 2);
            const mat = new THREE.MeshBasicMaterial({ 
                color: isPlayer ? 0x00ffff : 0xff6600,
                transparent: true,
                opacity: 0.8
            });
            const slash = new THREE.Mesh(geo, mat);
            slash.position.set((fx + tx) / 2, 1, (fz + tz) / 2);
            slash.lookAt(tx, 1, tz);
            scene.add(slash);

            // 动画
            let frame = 0;
            const animate = () => {
                frame++;
                slash.rotation.y += 0.5;
                slash.scale.x = 1 + frame * 0.1;
                slash.material.opacity = 0.8 - frame * 0.05;
                if (frame < 15) {
                    requestAnimationFrame(animate);
                } else {
                    scene.remove(slash);
                }
            };
            animate();
        }

        // 伤害数字
        function showDamage(x, y, damage) {
            const offset = (state.gridSize - 1) * state.cellSize / 2;
            const canvas = document.createElement('canvas');
            canvas.width = 128;
            canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.font = 'bold 40px Arial';
            ctx.fillStyle = '#ff0000';
            ctx.textAlign = 'center';
            ctx.fillText(`-${damage}`, 64, 45);

            const tex = new THREE.CanvasTexture(canvas);
            const geo = new THREE.PlaneGeometry(1.5, 0.75);
            const mat = new THREE.MeshBasicMaterial({ 
                map: tex, 
                transparent: true,
                side: THREE.DoubleSide
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x * state.cellSize - offset, 2, y * state.cellSize - offset);
            scene.add(mesh);

            let frame = 0;
            const animate = () => {
                frame++;
                mesh.position.y += 0.05;
                mesh.material.opacity = 1 - frame * 0.02;
                if (frame < 50) {
                    requestAnimationFrame(animate);
                } else {
                    scene.remove(mesh);
                }
            };
            animate();
        }

        // 游戏逻辑
        function getDistance(a, b) {
            return Math.abs(a.x - b.x) + Math.abs(a.y - b.y);
        }

        function attack(attacker, target, isPlayer) {
            const damage = Math.floor(Math.random() * 20) + 20;
            target.hp -= damage;
            
            createAttackEffect(attacker.x, attacker.y, target.x, target.y, isPlayer);
            showDamage(target.x, target.y, damage);

            if (isPlayer) {
                updateHpBar(enemyMesh, target.hp);
            } else {
                updateHpBar(playerMesh, target.hp);
            }

            if (target.hp <= 0) {
                endGame(isPlayer ? '你赢了！' : '你输了...');
            }
        }

        function endGame(message) {
            state.gameOver = true;
            showMessage(message);
            document.getElementById('restart-btn').style.display = 'block';
        }

        function showMessage(text) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.classList.add('show');
            setTimeout(() => msg.classList.remove('show'), 3000);
        }

        function switchTurn() {
            state.isPlayerTurn = !state.isPlayerTurn;
            const indicator = document.getElementById('turn-indicator');
            if (state.isPlayerTurn) {
                indicator.textContent = '你的回合';
                indicator.className = 'player-turn';
                showMoveRange();
            } else {
                indicator.textContent = '敌人回合';
                indicator.className = 'enemy-turn';
                clearMoveRange();
                setTimeout(enemyTurn, 1000);
            }
        }

        // 敌人 AI
        function enemyTurn() {
            if (state.gameOver) return;

            const dist = getDistance(state.enemy, state.player);

            if (dist === 1) {
                // 攻击
                attack(state.enemy, state.player, false);
            } else {
                // 向玩家移动
                let bestMove = null;
                let bestDist = dist;

                for (let x = 0; x < state.gridSize; x++) {
                    for (let y = 0; y < state.gridSize; y++) {
                        const moveDist = Math.abs(x - state.enemy.x) + Math.abs(y - state.enemy.y);
                        if (moveDist > 0 && moveDist <= state.moveRange) {
                            const newDist = Math.abs(x - state.player.x) + Math.abs(y - state.player.y);
                            if (newDist < bestDist) {
                                bestDist = newDist;
                                bestMove = { x, y };
                            }
                        }
                    }
                }

                if (bestMove) {
                    state.enemy.x = bestMove.x;
                    state.enemy.y = bestMove.y;
                    updateCharacterPosition(enemyMesh, bestMove.x, bestMove.y);
                    
                    // 移动后检查能否攻击
                    if (bestDist === 1) {
                        setTimeout(() => attack(state.enemy, state.player, false), 500);
                    }
                }
            }

            setTimeout(switchTurn, 1500);
        }

        // 点击交互
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('click', (event) => {
            if (!state.isPlayerTurn || state.gameOver) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(scene.children, true);

            for (const hit of intersects) {
                const obj = hit.object;
                
                // 点击移动指示器
                if (obj.userData.type === 'move') {
                    const { x, y } = obj.userData;
                    state.player.x = x;
                    state.player.y = y;
                    updateCharacterPosition(playerMesh, x, y);
                    
                    // 检查是否靠近敌人
                    if (getDistance(state.player, state.enemy) === 1) {
                        attack(state.player, state.enemy, true);
                    }
                    
                    switchTurn();
                    break;
                }
            }
        });

        // 窗口调整
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 重新开始
        window.restartGame = function() {
            state.player = { x: 1, y: 1, hp: 100 };
            state.enemy = { x: 3, y: 3, hp: 100 };
            state.isPlayerTurn = true;
            state.gameOver = false;
            
            updateCharacterPosition(playerMesh, 1, 1);
            updateCharacterPosition(enemyMesh, 3, 3);
            updateHpBar(playerMesh, 100);
            updateHpBar(enemyMesh, 100);
            
            document.getElementById('turn-indicator').textContent = '你的回合';
            document.getElementById('turn-indicator').className = 'player-turn';
            document.getElementById('restart-btn').style.display = 'none';
            
            showMoveRange();
        };

        // 初始化
        createGrid();
        createCharacters();
        showMoveRange();

        // 渲染循环
        function animate() {
            requestAnimationFrame(animate);
            
            // 角色待机动画
            if (playerMesh) {
                playerMesh.position.y = Math.sin(Date.now() * 0.003) * 0.05;
                playerMesh.rotation.y = Math.sin(Date.now() * 0.002) * 0.1;
            }
            if (enemyMesh) {
                enemyMesh.position.y = Math.sin(Date.now() * 0.003 + 1) * 0.05;
                enemyMesh.rotation.y = Math.sin(Date.now() * 0.002 + 1) * 0.1;
            }
            
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
