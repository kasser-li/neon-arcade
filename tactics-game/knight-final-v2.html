<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 骑士 - 三视图精修版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #2a2a3e 0%, #1a1a2e 50%, #0a0a15 100%);
            overflow: hidden;
            font-family: sans-serif;
        }
        #container { width: 100vw; height: 100vh; }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            background: rgba(0,0,0,0.7);
            padding: 20px 25px;
            border-radius: 12px;
            border: 1px solid #444;
        }
        #ui h1 { 
            font-size: 1.3em; 
            margin-bottom: 12px;
            background: linear-gradient(45deg, #ffd700, #ffaa00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        #ui p { color: #888; font-size: 0.85em; margin: 6px 0; }
    </style>
</head>
<body>
    <div id="container"></div>
    <div id="ui">
        <h1>🛡️ 圣殿骑士</h1>
        <p>🖱️ 左键 - 旋转</p>
        <p>🖱️ 右键 - 平移</p>
        <p>🖱️ 滚轮 - 缩放</p>
    </div>

    <script type="module">
        import * as THREE from 'https://esm.sh/three@0.160.0';
        import { OrbitControls } from 'https://esm.sh/three@0.160.0/examples/jsm/controls/OrbitControls.js';

        // 场景
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);
        scene.fog = new THREE.FogExp2(0x1a1a2e, 0.02);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(5, 3.5, 5);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.getElementById('container').appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 1.4, 0);

        // 灯光
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.35);
        scene.add(ambientLight);

        const mainLight = new THREE.DirectionalLight(0xfff4e6, 1.0);
        mainLight.position.set(5, 8, 5);
        mainLight.castShadow = true;
        mainLight.shadow.mapSize.width = 2048;
        mainLight.shadow.mapSize.height = 2048;
        scene.add(mainLight);

        const rimLight = new THREE.DirectionalLight(0x4488ff, 0.5);
        rimLight.position.set(-5, 3, -5);
        scene.add(rimLight);

        // 地面
        const ground = new THREE.Mesh(
            new THREE.CircleGeometry(6, 64),
            new THREE.MeshStandardMaterial({ color: 0x151525, roughness: 0.8 })
        );
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.01;
        ground.receiveShadow = true;
        scene.add(ground);

        // 材质
        const M = {
            silver: new THREE.MeshStandardMaterial({ color: 0xe8e8e8, metalness: 0.9, roughness: 0.2 }),
            gold: new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 0.95, roughness: 0.15, emissive: 0x443300, emissiveIntensity: 0.3 }),
            black: new THREE.MeshStandardMaterial({ color: 0x1a1a1a, metalness: 0.7, roughness: 0.4 }),
            blueCape: new THREE.MeshStandardMaterial({ color: 0x1e4a9e, roughness: 0.9, side: THREE.DoubleSide }),
            redCape: new THREE.MeshStandardMaterial({ color: 0x8b1e1e, roughness: 0.9, side: THREE.DoubleSide }),
            blueSkirt: new THREE.MeshStandardMaterial({ color: 0x2563eb, roughness: 0.85, side: THREE.DoubleSide }),
            chainmail: new THREE.MeshStandardMaterial({ color: 0x666666, metalness: 0.8, roughness: 0.5 }),
            leather: new THREE.MeshStandardMaterial({ color: 0x4a3728, roughness: 0.9 }),
            visor: new THREE.MeshStandardMaterial({ color: 0x0a0a0a, metalness: 0.6, roughness: 0.3 }),
            glowBlue: new THREE.MeshBasicMaterial({ color: 0x00aaff, transparent: true, opacity: 0.9 }),
            gem: new THREE.MeshPhysicalMaterial({ color: 0x1e40af, metalness: 0.9, roughness: 0.1, transmission: 0.5, thickness: 1.5, clearcoat: 1.0 })
        };

        // 骑士
        const knight = new THREE.Group();
        scene.add(knight);

        // ===== 腿部 =====
        function createLeg(x) {
            const leg = new THREE.Group();
            const side = x > 0 ? 1 : -1;
            
            // 大腿（黑）
            const thigh = new THREE.Mesh(new THREE.CylinderGeometry(0.14, 0.12, 0.5, 12), M.black);
            thigh.position.set(x, 0.5, 0);
            thigh.castShadow = true;
            leg.add(thigh);
            
            // 膝盖（银）
            const knee = new THREE.Mesh(new THREE.SphereGeometry(0.13, 16, 16), M.silver);
            knee.position.set(x, 0.22, 0);
            knee.castShadow = true;
            leg.add(knee);
            
            // 小腿（黑）
            const shin = new THREE.Mesh(new THREE.CylinderGeometry(0.11, 0.1, 0.45, 12), M.black);
            shin.position.set(x, -0.05, 0);
            shin.castShadow = true;
            leg.add(shin);
            
            // 脚（黑）
            const foot = new THREE.Mesh(new THREE.BoxGeometry(0.16, 0.1, 0.25), M.black);
            foot.position.set(x, -0.32, 0.03);
            foot.castShadow = true;
            leg.add(foot);
            
            return leg;
        }
        knight.add(createLeg(-0.2));
        knight.add(createLeg(0.2));

        // ===== 战裙（蓝色）=====
        const skirt = new THREE.Group();
        const frontSkirt = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.55, 0.08), M.blueSkirt);
        frontSkirt.position.set(0, 0.85, 0.15);
        frontSkirt.castShadow = true;
        skirt.add(frontSkirt);
        
        const skirtTrim = new THREE.Mesh(new THREE.BoxGeometry(0.52, 0.04, 0.09), M.gold);
        skirtTrim.position.set(0, 0.58, 0.15);
        skirt.add(skirtTrim);
        
        knight.add(skirt);

        // ===== 躯干 =====
        const torso = new THREE.Group();
        
        // 腹部（银）
        const abdomen = new THREE.Mesh(new THREE.CylinderGeometry(0.28, 0.32, 0.35, 12), M.silver);
        abdomen.position.y = 1.05;
        abdomen.castShadow = true;
        torso.add(abdomen);
        
        // 胸甲（银）
        const chest = new THREE.Mesh(new THREE.CylinderGeometry(0.32, 0.28, 0.7, 12), M.silver);
        chest.position.y = 1.5;
        chest.castShadow = true;
        torso.add(chest);
        
        // 胸甲金色竖条
        const chestStripe = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.65, 0.05), M.gold);
        chestStripe.position.set(0, 1.5, 0.3);
        chestStripe.castShadow = true;
        torso.add(chestStripe);
        
        // 胸甲金色横条
        const chestTopTrim = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.04, 0.05), M.gold);
        chestTopTrim.position.set(0, 1.82, 0.3);
        torso.add(chestTopTrim);
        
        const chestBottomTrim = new THREE.Mesh(new THREE.BoxGeometry(0.52, 0.04, 0.05), M.gold);
        chestBottomTrim.position.set(0, 1.18, 0.3);
        torso.add(chestBottomTrim);
        
        // 腰部金扣
        for (let i = -1; i <= 1; i += 2) {
            const buckle = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 0.04, 12), M.gold);
            buckle.position.set(i * 0.18, 0.88, 0.28);
            buckle.rotation.x = Math.PI / 2;
            torso.add(buckle);
        }
        
        knight.add(torso);

        // ===== 肩甲（多层）=====
        function createShoulder(x) {
            const shoulder = new THREE.Group();
            const side = x > 0 ? 1 : -1;
            
            for (let i = 0; i < 4; i++) {
                const layer = new THREE.Mesh(
                    new THREE.BoxGeometry(0.25 - i * 0.04, 0.06, 0.15),
                    i === 0 ? M.gold : M.silver
                );
                layer.position.set(x - i * 0.02 * side, 1.75 - i * 0.07, 0.05);
                layer.rotation.z = -side * 0.15;
                layer.rotation.y = side * 0.2;
                layer.castShadow = true;
                shoulder.add(layer);
            }
            
            const clasp = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.05, 16), M.gold);
            clasp.position.set(x * 0.8, 1.82, 0);
            clasp.rotation.x = Math.PI / 2;
            shoulder.add(clasp);
            
            return shoulder;
        }
        knight.add(createShoulder(-0.35));
        knight.add(createShoulder(0.35));

        // ===== 手臂 =====
        function createArm(x, isShield) {
            const arm = new THREE.Group();
            const side = x > 0 ? 1 : -1;
            
            // 锁子甲上臂
            const upperArm = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.09, 0.35, 12), M.chainmail);
            upperArm.position.set(x, 1.6, 0);
            upperArm.rotation.z = -side * 0.15;
            upperArm.castShadow = true;
            arm.add(upperArm);
            
            // 银色护臂
            const forearm = new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.08, 0.4, 12), M.silver);
            forearm.position.set(x * 1.1, 1.3, isShield ? 0.08 : 0.05);
            forearm.rotation.z = side * 0.2;
            forearm.castShadow = true;
            arm.add(forearm);
            
            // 金色护手
            const gauntlet = new THREE.Mesh(new THREE.BoxGeometry(0.13, 0.14, 0.13), M.gold);
            gauntlet.position.set(x * 1.15, 1.05, isShield ? 0.15 : 0.1);
            gauntlet.castShadow = true;
            arm.add(gauntlet);
            
            return arm;
        }
        knight.add(createArm(-0.52, true));  // 左手持盾
        knight.add(createArm(0.52, false));  // 右手持剑

        // ===== 头部 =====
        const head = new THREE.Group();
        
        // 脖子（锁子甲）
        const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.13, 0.15, 0.25, 12), M.chainmail);
        neck.position.y = 2.0;
        head.add(neck);
        
        // 头盔（银）
        const helmet = new THREE.Mesh(new THREE.SphereGeometry(0.27, 24, 24, 0, Math.PI * 2, 0, Math.PI / 2.3), M.silver);
        helmet.position.y = 2.32;
        helmet.castShadow = true;
        head.add(helmet);
        
        // 面罩（黑）
        const visor = new THREE.Mesh(new THREE.BoxGeometry(0.32, 0.22, 0.18), M.visor);
        visor.position.set(0, 2.28, 0.23);
        visor.castShadow = true;
        head.add(visor);
        
        // 发光眼缝（蓝）
        const eyeGlow = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.05, 0.03), M.glowBlue);
        eyeGlow.position.set(0, 2.32, 0.32);
        head.add(eyeGlow);
        
        // 头盔金色尖顶
        const spike = new THREE.Mesh(new THREE.ConeGeometry(0.08, 0.35, 4), M.gold);
        spike.position.set(0, 2.65, -0.05);
        spike.rotation.y = Math.PI / 4;
        spike.castShadow = true;
        head.add(spike);
        
        // 蓝色羽毛
        const plume = new THREE.Mesh(new THREE.ConeGeometry(0.1, 0.5, 8), M.blueSkirt);
        plume.position.set(0, 2.95, -0.15);
        plume.rotation.x = -0.35;
        plume.castShadow = true;
        head.add(plume);
        
        knight.add(head);

        // ===== 剑 =====
        const sword = new THREE.Group();
        
        const hilt = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.28, 12), M.leather);
        sword.add(hilt);
        
        const guard = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.07, 0.07), M.gold);
        guard.position.y = 0.17;
        guard.castShadow = true;
        sword.add(guard);
        
        const blade = new THREE.Mesh(new THREE.BoxGeometry(0.05, 1.3, 0.012), M.silver);
        blade.position.y = 0.8;
        blade.castShadow = true;
        sword.add(blade);
        
        sword.position.set(0.75, 1.1, 0.35);
        sword.rotation.z = -0.15;
        sword.rotation.x = 0.1;
        knight.add(sword);

        // ===== 盾牌 =====
        const shield = new THREE.Group();
        
        // 盾体（六边形银）
        const shieldBody = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.45, 0.06, 6), M.silver);
        shieldBody.rotation.x = Math.PI / 2;
        shieldBody.rotation.z = Math.PI / 2;
        shieldBody.castShadow = true;
        shield.add(shieldBody);
        
        // 金边
        const shieldRim = new THREE.Mesh(new THREE.TorusGeometry(0.47, 0.04, 8, 6), M.gold);
        shieldRim.position.z = 0.03;
        shield.add(shieldRim);
        
        // 蓝色徽章
        const emblem = new THREE.Mesh(new THREE.CircleGeometry(0.2, 8), M.blueSkirt);
        emblem.position.z = 0.04;
        shield.add(emblem);
        
        // 中央蓝宝石
        const centerGem = new THREE.Mesh(new THREE.OctahedronGeometry(0.1), M.gem);
        centerGem.position.z = 0.15;
        shield.add(centerGem);
        
        // 金环
        const emblemRing = new THREE.Mesh(new THREE.TorusGeometry(0.15, 0.02, 8, 16), M.gold);
        emblemRing.position.z = 0.05;
        shield.add(emblemRing);
        
        shield.position.set(-0.75, 1.1, 0.4);
        shield.rotation.y = 0.35;
        knight.add(shield);

        // ===== 披风 =====
        const cape = new THREE.Group();
        
        const capeOuter = new THREE.Mesh(new THREE.BoxGeometry(0.9, 1.8, 0.03), M.blueCape);
        capeOuter.position.set(0, 1.3, -0.42);
        capeOuter.rotation.x = 0.2;
        capeOuter.castShadow = true;
        cape.add(capeOuter);
        
        const capeInner = new THREE.Mesh(new THREE.BoxGeometry(0.85, 1.75, 0.025), M.redCape);
        capeInner.position.set(0, 1.3, -0.4);
        capeInner.rotation.x = 0.2;
        cape.add(capeInner);
        
        const claspL = new THREE.Mesh(new THREE.SphereGeometry(0.09, 16, 16), M.gold);
        claspL.position.set(-0.38, 1.85, -0.25);
        cape.add(claspL);
        
        const claspR = new THREE.Mesh(new THREE.SphereGeometry(0.09, 16, 16), M.gold);
        claspR.position.set(0.38, 1.85, -0.25);
        cape.add(claspR);
        
        knight.add(cape);

        // 动画
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.012;
            
            knight.position.y = Math.sin(time) * 0.012;
            knight.rotation.y = Math.sin(time * 0.4) * 0.02;
            capeOuter.rotation.z = Math.sin(time * 1.2) * 0.015;
            capeInner.rotation.z = Math.sin(time * 1.2) * 0.015;
            plume.rotation.z = Math.sin(time * 1.8) * 0.025;
            M.glowBlue.opacity = 0.7 + Math.sin(time * 2.5) * 0.2;
            M.gem.emissive = new THREE.Color(0x1e40af);
            M.gem.emissiveIntensity = 0.4 + Math.sin(time * 3) * 0.3;
            
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
