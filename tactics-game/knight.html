<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 骑士模型</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            overflow: hidden;
        }
        #container {
            width: 100vw;
            height: 100vh;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            font-family: sans-serif;
            background: rgba(0,0,0,0.5);
            padding: 15px;
            border-radius: 10px;
        }
        #info h2 { margin-bottom: 10px; }
        #info p { color: #888; font-size: 0.9em; }
    </style>
</head>
<body>
    <div id="container"></div>
    <div id="info">
        <h2>🛡️ 骑士模型</h2>
        <p>鼠标拖拽旋转视角</p>
        <p>滚轮缩放</p>
    </div>

    <script type="module">
        import * as THREE from 'https://esm.sh/three@0.160.0';
        import { OrbitControls } from 'https://esm.sh/three@0.160.0/examples/jsm/controls/OrbitControls.js';

        // 场景
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);
        scene.fog = new THREE.Fog(0x1a1a2e, 10, 50);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(8, 6, 8);
        camera.lookAt(0, 2, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.getElementById('container').appendChild(renderer.domElement);

        // 控制器
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 2, 0);

        // 灯光
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        scene.add(dirLight);

        const rimLight = new THREE.DirectionalLight(0x4488ff, 0.5);
        rimLight.position.set(-5, 5, -5);
        scene.add(rimLight);

        // 地面
        const groundGeo = new THREE.PlaneGeometry(20, 20);
        const groundMat = new THREE.MeshStandardMaterial({ 
            color: 0x0a0a15,
            roughness: 0.8,
            metalness: 0.2
        });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // 网格辅助
        const grid = new THREE.GridHelper(20, 20, 0x333344, 0x222233);
        grid.position.y = 0.01;
        scene.add(grid);

        // 骑士组
        const knight = new THREE.Group();
        scene.add(knight);

        // 材质
        const armorMat = new THREE.MeshStandardMaterial({
            color: 0xc0c0c0,
            metalness: 0.8,
            roughness: 0.3
        });

        const darkArmorMat = new THREE.MeshStandardMaterial({
            color: 0x444444,
            metalness: 0.7,
            roughness: 0.4
        });

        const goldMat = new THREE.MeshStandardMaterial({
            color: 0xffd700,
            metalness: 0.9,
            roughness: 0.2,
            emissive: 0x332200,
            emissiveIntensity: 0.2
        });

        const clothMat = new THREE.MeshStandardMaterial({
            color: 0x0066cc,
            roughness: 0.9
        });

        const skinMat = new THREE.MeshStandardMaterial({
            color: 0xffccaa,
            roughness: 0.8
        });

        // ========== 身体 ==========
        
        // 躯干
        const torsoGeo = new THREE.CylinderGeometry(0.35, 0.3, 1.2, 8);
        const torso = new THREE.Mesh(torsoGeo, armorMat);
        torso.position.y = 1.6;
        torso.castShadow = true;
        knight.add(torso);

        // 胸甲装饰
        const chestGeo = new THREE.BoxGeometry(0.5, 0.4, 0.15);
        const chest = new THREE.Mesh(chestGeo, goldMat);
        chest.position.set(0, 1.8, 0.25);
        chest.castShadow = true;
        knight.add(chest);

        // 腰带
        const beltGeo = new THREE.CylinderGeometry(0.32, 0.32, 0.15, 8);
        const belt = new THREE.Mesh(beltGeo, darkArmorMat);
        belt.position.y = 1.1;
        belt.castShadow = true;
        knight.add(belt);

        // 裙甲
        for (let i = 0; i < 8; i++) {
            const angle = (i / 8) * Math.PI * 2;
            const skirtGeo = new THREE.BoxGeometry(0.15, 0.5, 0.05);
            const skirt = new THREE.Mesh(skirtGeo, armorMat);
            skirt.position.set(
                Math.cos(angle) * 0.25,
                0.9,
                Math.sin(angle) * 0.25
            );
            skirt.rotation.y = -angle;
            skirt.rotation.x = 0.3;
            skirt.castShadow = true;
            knight.add(skirt);
        }

        // ========== 头部 ==========
        
        // 脖子
        const neckGeo = new THREE.CylinderGeometry(0.12, 0.15, 0.3, 8);
        const neck = new THREE.Mesh(neckGeo, skinMat);
        neck.position.y = 2.35;
        knight.add(neck);

        // 头盔主体
        const helmetGeo = new THREE.SphereGeometry(0.28, 16, 16);
        const helmet = new THREE.Mesh(helmetGeo, armorMat);
        helmet.position.y = 2.7;
        helmet.castShadow = true;
        knight.add(helmet);

        // 头盔面罩
        const visorGeo = new THREE.CylinderGeometry(0.25, 0.28, 0.2, 8, 1, false, 0, Math.PI);
        const visor = new THREE.Mesh(visorGeo, darkArmorMat);
        visor.position.y = 2.65;
        visor.rotation.x = -0.2;
        visor.castShadow = true;
        knight.add(visor);

        // 眼睛缝隙（发光）
        const eyeGeo = new THREE.BoxGeometry(0.15, 0.03, 0.02);
        const eyeMat = new THREE.MeshBasicMaterial({ color: 0x00ffff });
        const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
        leftEye.position.set(-0.08, 2.7, 0.22);
        knight.add(leftEye);
        const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
        rightEye.position.set(0.08, 2.7, 0.22);
        knight.add(rightEye);

        // 头盔羽饰
        const plumeGeo = new THREE.ConeGeometry(0.08, 0.6, 8);
        const plume = new THREE.Mesh(plumeGeo, clothMat);
        plume.position.set(0, 3.2, -0.15);
        plume.rotation.x = -0.3;
        plume.castShadow = true;
        knight.add(plume);

        // 头盔装饰
        const crestGeo = new THREE.BoxGeometry(0.05, 0.4, 0.15);
        const crest = new THREE.Mesh(crestGeo, goldMat);
        crest.position.set(0, 3, 0);
        knight.add(crest);

        // ========== 手臂 ==========
        
        function createArm(isLeft) {
            const armGroup = new THREE.Group();
            const side = isLeft ? -1 : 1;

            // 肩膀
            const shoulderGeo = new THREE.SphereGeometry(0.2, 12, 12);
            const shoulder = new THREE.Mesh(shoulderGeo, armorMat);
            shoulder.position.set(side * 0.45, 2, 0);
            shoulder.castShadow = true;
            armGroup.add(shoulder);

            // 上臂
            const upperArmGeo = new THREE.CylinderGeometry(0.12, 0.1, 0.5, 8);
            const upperArm = new THREE.Mesh(upperArmGeo, armorMat);
            upperArm.position.set(side * 0.45, 1.7, 0);
            upperArm.rotation.z = side * 0.1;
            upperArm.castShadow = true;
            armGroup.add(upperArm);

            // 肘部
            const elbowGeo = new THREE.SphereGeometry(0.1, 10, 10);
            const elbow = new THREE.Mesh(elbowGeo, darkArmorMat);
            elbow.position.set(side * 0.48, 1.4, 0);
            elbow.castShadow = true;
            armGroup.add(elbow);

            // 前臂
            const forearmGeo = new THREE.CylinderGeometry(0.09, 0.08, 0.45, 8);
            const forearm = new THREE.Mesh(forearmGeo, armorMat);
            forearm.position.set(side * 0.5, 1.1, 0);
            forearm.rotation.z = side * 0.15;
            forearm.castShadow = true;
            armGroup.add(forearm);

            // 手
            const handGeo = new THREE.BoxGeometry(0.12, 0.15, 0.12);
            const hand = new THREE.Mesh(handGeo, darkArmorMat);
            hand.position.set(side * 0.52, 0.85, 0);
            hand.castShadow = true;
            armGroup.add(hand);

            return armGroup;
        }

        const leftArm = createArm(true);
        knight.add(leftArm);

        const rightArm = createArm(false);
        knight.add(rightArm);

        // ========== 腿 ==========
        
        function createLeg(isLeft) {
            const legGroup = new THREE.Group();
            const side = isLeft ? -1 : 1;

            // 大腿
            const thighGeo = new THREE.CylinderGeometry(0.14, 0.12, 0.6, 8);
            const thigh = new THREE.Mesh(thighGeo, armorMat);
            thigh.position.set(side * 0.2, 0.6, 0);
            thigh.castShadow = true;
            legGroup.add(thigh);

            // 膝盖
            const kneeGeo = new THREE.SphereGeometry(0.11, 10, 10);
            const knee = new THREE.Mesh(kneeGeo, darkArmorMat);
            knee.position.set(side * 0.2, 0.25, 0);
            knee.castShadow = true;
            legGroup.add(knee);

            // 小腿
            const shinGeo = new THREE.CylinderGeometry(0.1, 0.09, 0.5, 8);
            const shin = new THREE.Mesh(shinGeo, armorMat);
            shin.position.set(side * 0.2, 0, 0);
            shin.castShadow = true;
            legGroup.add(shin);

            // 脚
            const footGeo = new THREE.BoxGeometry(0.15, 0.1, 0.25);
            const foot = new THREE.Mesh(footGeo, darkArmorMat);
            foot.position.set(side * 0.2, -0.3, 0.05);
            foot.castShadow = true;
            legGroup.add(foot);

            return legGroup;
        }

        const leftLeg = createLeg(true);
        knight.add(leftLeg);

        const rightLeg = createLeg(false);
        knight.add(rightLeg);

        // ========== 剑 ==========
        
        const swordGroup = new THREE.Group();
        
        // 剑柄
        const hiltGeo = new THREE.CylinderGeometry(0.04, 0.04, 0.3, 8);
        const hilt = new THREE.Mesh(hiltGeo, new THREE.MeshStandardMaterial({ color: 0x4a3728 }));
        swordGroup.add(hilt);

        // 护手
        const guardGeo = new THREE.BoxGeometry(0.25, 0.05, 0.08);
        const guard = new THREE.Mesh(guardGeo, goldMat);
        guard.position.y = 0.18;
        guard.castShadow = true;
        swordGroup.add(guard);

        // 剑身
        const bladeGeo = new THREE.BoxGeometry(0.08, 1.2, 0.02);
        const bladeMat = new THREE.MeshStandardMaterial({
            color: 0xcccccc,
            metalness: 0.9,
            roughness: 0.1
        });
        const blade = new THREE.Mesh(bladeGeo, bladeMat);
        blade.position.y = 0.8;
        blade.castShadow = true;
        swordGroup.add(blade);

        // 剑尖
        const tipGeo = new THREE.ConeGeometry(0.04, 0.15, 4);
        const tip = new THREE.Mesh(tipGeo, bladeMat);
        tip.position.y = 1.475;
        tip.rotation.y = Math.PI / 4;
        tip.castShadow = true;
        swordGroup.add(tip);

        // 剑放到右手
        swordGroup.position.set(0.6, 1.3, 0.3);
        swordGroup.rotation.z = -0.3;
        swordGroup.rotation.x = 0.2;
        knight.add(swordGroup);

        // ========== 盾 ==========
        
        const shieldGroup = new THREE.Group();

        // 盾主体
        const shieldGeo = new THREE.CylinderGeometry(0.5, 0.4, 0.08, 6);
        const shieldMat = new THREE.MeshStandardMaterial({
            color: 0x444444,
            metalness: 0.6,
            roughness: 0.4
        });
        const shield = new THREE.Mesh(shieldGeo, shieldMat);
        shield.rotation.x = Math.PI / 2;
        shield.rotation.z = Math.PI / 2;
        shield.castShadow = true;
        shieldGroup.add(shield);

        // 盾边
        const shieldRimGeo = new THREE.TorusGeometry(0.45, 0.03, 8, 6);
        const shieldRim = new THREE.Mesh(shieldRimGeo, goldMat);
        shieldRim.position.z = 0.04;
        shieldGroup.add(shieldRim);

        // 盾徽
        const emblemGeo = new THREE.CylinderGeometry(0.2, 0.2, 0.1, 6);
        const emblem = new THREE.Mesh(emblemGeo, clothMat);
        emblem.rotation.x = Math.PI / 2;
        emblem.position.z = 0.05;
        shieldGroup.add(emblem);

        // 盾放到左手
        shieldGroup.position.set(-0.6, 1.3, 0.2);
        shieldGroup.rotation.y = 0.3;
        knight.add(shieldGroup);

        // ========== 披风 ==========
        
        const capeGeo = new THREE.BoxGeometry(0.6, 1.2, 0.05);
        const cape = new THREE.Mesh(capeGeo, clothMat);
        cape.position.set(0, 1.4, -0.35);
        cape.rotation.x = 0.1;
        cape.castShadow = true;
        knight.add(cape);

        // ========== 动画 ==========
        
        let time = 0;
        
        function animate() {
            requestAnimationFrame(animate);
            time += 0.02;

            // 呼吸动画
            knight.position.y = Math.sin(time) * 0.02;
            
            // 轻微摆动
            knight.rotation.y = Math.sin(time * 0.5) * 0.05;

            // 披风飘动
            cape.rotation.z = Math.sin(time * 2) * 0.05;
            
            // 羽饰飘动
            plume.rotation.z = Math.sin(time * 3) * 0.1;

            // 剑光闪烁
            bladeMat.emissive = new THREE.Color(0x222244);
            bladeMat.emissiveIntensity = 0.3 + Math.sin(time * 4) * 0.2;

            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // 窗口调整
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
